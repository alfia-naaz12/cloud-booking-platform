<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CloudBooking</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard/">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <span class="nav-link text-light">
                            👤 {{ user.username }}
                        </span>
                    </li>

                    <li class="nav-item">
                        <a class="btn btn-danger btn-sm ms-2" href="/logout/">Logout</a>
                    </li>

                {% else %}

                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/signup/">Sign Up</a>
                    </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>
{% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-12">

            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Book an Appointment</h4>
                </div>

                <div class="card-body">
                    <form method="get" action="/availability/">

                        <div class="mb-3">
                            <label class="form-label">Select Service</label>
                            <select class="form-select" name="service_id" required>
                                 <option value="">-- Please Select Service --</option>
                                 {% for service in services %}
                                 <option value="{{ service.id }}">
                                    {{ service.name }} ({{ service.duration_minutes }} mins)
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Staff</label>
                            <select class="form-select" name="staff_id" required>
                                <option value="">-- Please Select Staff --</option>
                                {% for s in staff %}
                                <option value="{{ s.id }}">
                                    {{ s.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Date</label>
                            <input type="date" class="form-control" name="date" required>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg">
                                Check Availability
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
