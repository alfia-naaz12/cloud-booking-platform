<!DOCTYPE html>
<html>
<head>
    <title>Login - CloudBooking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-primary {
            background: #e91e63;
            border: none;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-primary:hover {
            background: #d81b60;
        }

        .login-title {
            color: #e91e63;
            font-weight: bold;
        }

        .back-home {
            text-decoration: none;
            color: #555;
        }

        .back-home:hover {
            color: #e91e63;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="col-md-4">
        <div class="login-card">

            <h3 class="text-center mb-4 login-title">Welcome Back 💄</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">
                    Login
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'home' %}" class="back-home">
                    ← Back to Home
                </a>
            </div>

        </div>
    </div>

</body>
</html>
